<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>კავშირი არ არის — GoniCore</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 60%,#312e81 100%);
  color:#fff;padding:24px;
}
.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:56px 48px;
  max-width:480px;width:100%;
  text-align:center;
  backdrop-filter:blur(12px);
  box-shadow:0 32px 80px rgba(0,0,0,.35);
}
.logo{margin-bottom:28px}
.icon-wrap{
  width:96px;height:96px;margin:0 auto 24px;
  background:rgba(239,68,68,.12);
  border:1px solid rgba(239,68,68,.25);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.25)}
  50%{box-shadow:0 0 0 16px rgba(239,68,68,0)}
}
h1{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:10px}
.sub{font-size:14.5px;color:#94a3b8;line-height:1.7;margin-bottom:8px}
.sub-en{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:28px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:#10B27C;color:#fff;border:none;
  padding:13px 32px;border-radius:10px;
  font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:background .15s,transform .1s;
  letter-spacing:-.2px;
}
.btn:hover{background:#0e9c6c}
.btn:active{transform:scale(.98)}
.status{
  margin-top:22px;font-size:12.5px;color:#64748b;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0}
.dot.on{background:#10B27C}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="140" height="70">
      <rect x="15" y="26" width="48" height="48" rx="10" fill="none" stroke="#fff" stroke-width="5" opacity=".7"/>
      <rect x="27" y="38" width="24" height="24" rx="6" fill="#10B27C"/>
      <text x="80" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="900" fill="#ffffff" letter-spacing="-0.5">Goni</text>
      <text x="80" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="300" fill="#10B27C" letter-spacing="-0.5">Core</text>
    </svg>
  </div>

  <div class="icon-wrap">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
  </div>

  <h1>ინტერნეტ კავშირი არ არის</h1>
  <p class="sub">თქვენი მოწყობილობა ქსელს ვერ უკავშირდება.<br>შეამოწმეთ კავშირი — როგორც კი აღდგება, გვერდი ავტომატურად განახლდება.</p>
  <p class="sub-en">No internet connection. The page will reload automatically once you're back online.</p>

  <button class="btn" onclick="retry()">↻ &nbsp;ხელახლა ცდა</button>

  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">ხაზგარეშე / Offline</span>
  </div>
</div>

<script>
function retry() { location.reload(); }

function setOnline(on) {
  document.getElementById('dot').classList.toggle('on', on);
  document.getElementById('statusText').textContent = on ? 'კავშირი აღდგა — იტვირთება…' : 'ხაზგარეშე / Offline';
  if (on) setTimeout(retry, 600);
}

window.addEventListener('online',  function(){ setOnline(true);  });
window.addEventListener('offline', function(){ setOnline(false); });

/* navigator.onLine can be stale — verify with a real request every 5s */
setInterval(function() {
  fetch('./sw.js', { method: 'HEAD', cache: 'no-store' })
    .then(function(){ setOnline(true); })
    .catch(function(){ /* still offline */ });
}, 5000);
</script>
</body>
</html>
